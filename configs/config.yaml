data:
  path: data/processed

training:
# --- dataset
  cache_rate: 1
  patch_size: [96, 96, 64]
  num_samples: 4
  spacing: [1.0, 1.0, 1.0]
# --- loader
  batch_size: 2
  val_batch_size: 1
  num_workers: 0
# --- validate
  roi_size: [96, 96, 64]
  sw_batch_size: 2
  overlap: 0.25
# --- trainer
  max_epochs: 150
  accelerator: auto
  precision: 16     
  accumulate_grad_batches: 1
  gradient_clip_val: 1
  earlystop: 15

model:
  spatial_dims: 3
  in_channels: 1
  out_channels: 2
  channels: [32, 64, 128, 256, 512]
  strides: [2, 2, 2, 2]
  res_units: 0
  norm: INSTANCE     

optimizer:
  type: AdamW
  optimizer_params:
    lr: 0.0003
    weight_decay: 0.00001

scheduler:
  # type: platau
  # scheduler_params:
  #   mode: max
  #   factor: 0.5
  #   patience: 10
  #   monitor: val_dice
  #   verbose: False

  type: cosine
  warmup_epochs: 0.1

logging:
  # --- checkpoint
  checkpoint_monitor: val_dice
  checkpoint_mode: max
  save_top_k: 1
  # --- mlflow
  mlflow: True

seed: 42

